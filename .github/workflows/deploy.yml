name: Deploy ke Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo, phar, tokenizer

      - name: Install Dependencies Backend
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend & Gabungkan ke Backend
        run: |
          cd frontend
          npm install
          npm run build
          # Pindahkan hasil build React ke folder public Laravel
          cp -R dist/* ../backend/public/

      - name: Upload ke Hostinger via SSH (Rsync)
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: "backend/"
          TARGET: "/domains/domain-kamu.com/wedding-app/"
          EXCLUDE: "/node_modules/, /.git/, /.env*"
